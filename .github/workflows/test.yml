name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Run headless play-through regression
        run: node test/headless.js
