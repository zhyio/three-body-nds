name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run headless play-through regression
        run: node test/headless.js
