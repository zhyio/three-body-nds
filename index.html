<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>三体 · 红岸 —— NDS 小剧场</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #04050a;
    overflow: hidden;
    font-family: "MS Gothic", monospace;
    -webkit-font-smoothing: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 38%, #14101c 0%, #04050a 70%);
    cursor: pointer;
  }
  #frame {
    position: relative;
    padding: 14px;
    border-radius: 16px;
    background: linear-gradient(160deg, #201a2c 0%, #0c0a14 60%, #1a1424 100%);
    box-shadow:
      0 0 0 2px #06060e,
      0 0 40px rgba(0,0,0,0.9),
      inset 0 1px 2px rgba(255,255,255,0.06),
      inset 0 -2px 4px rgba(0,0,0,0.6);
  }
  #frame::before {
    content: "◈  R E D   C O A S T   ·   三 体 监 听 系 统";
    position: absolute;
    top: 4px; left: 0; right: 0;
    text-align: center;
    font-size: 7px; letter-spacing: 2px;
    color: #43324c;
  }
  #screenWrap {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    box-shadow:
      inset 0 0 0 3px #04050a,
      inset 0 0 24px rgba(0,0,0,0.85),
      0 0 2px rgba(200,120,120,0.15);
    background: #000;
  }
  #screen {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    image-rendering: auto;
  }
  #screenWrap::after {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 8%, rgba(255,255,255,0.06), rgba(255,255,255,0) 55%);
    mix-blend-mode: screen;
  }
  #hint {
    position: absolute;
    bottom: 3px; left: 0; right: 0;
    text-align: center;
    font-size: 7px; letter-spacing: 1px;
    color: #3a2c44;
  }
  #hint b { color: #6a4a5e; }
  :fullscreen #frame, :-webkit-full-screen #frame {
    padding: 0; border-radius: 0; background: #000; box-shadow: none;
  }
  :fullscreen #frame::before, :fullscreen #hint { display: none; }
  :fullscreen #screenWrap { border-radius: 0; box-shadow: none; }
</style>
</head>
<body>
  <div id="frame">
    <div id="screenWrap">
      <canvas id="screen" width="320" height="180"></canvas>
      <canvas id="ui"></canvas>
    </div>
    <div id="hint"><b>[Z/空格/点击]</b> 推进对白 &nbsp; <b>[F]</b> 全屏 &nbsp; <b>[M]</b> 静音 &nbsp; <b>[R]</b> 重播</div>
  </div>

  <!-- 引擎 -->
  <script src="js/engine.js"></script>
  <script src="js/display.js"></script>
  <!-- 音频 -->
  <script src="js/audio.js"></script>
  <script src="js/music.js"></script>
  <script src="js/score.js"></script>
  <script src="js/score2.js"></script>
  <!-- 美术 -->
  <script src="js/scenes.js"></script>
  <script src="js/actors.js"></script>
  <script src="js/ui.js"></script>
  <!-- 导演 & 剧本 -->
  <script src="js/director.js"></script>
  <script src="js/play.js"></script>
  <script src="js/play2.js"></script>
  <!-- 入口 -->
  <script src="js/main.js"></script>
</body>
</html>
