<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#04050a" />
<title>三体 · 红岸 —— NDS 小剧场</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #04050a;
    overflow: hidden;
    font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 38%, #14101c 0%, #04050a 70%);
    cursor: pointer;
  }
  #frame {
    position: relative;
    padding: 14px;
    border-radius: 16px;
    background: linear-gradient(160deg, #201a2c 0%, #0c0a14 60%, #1a1424 100%);
    box-shadow:
      0 0 0 2px #06060e,
      0 0 40px rgba(0,0,0,0.9),
      inset 0 1px 2px rgba(255,255,255,0.06),
      inset 0 -2px 4px rgba(0,0,0,0.6);
    max-width: 100vw; max-height: 100vh;
  }
  #frame::before {
    content: "◈  R E D   C O A S T   ·   三 体 监 听 系 统";
    position: absolute;
    top: 4px; left: 0; right: 0;
    text-align: center;
    font-size: 7px; letter-spacing: 2px;
    color: #43324c;
  }
  #screenWrap {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    box-shadow:
      inset 0 0 0 3px #04050a,
      inset 0 0 24px rgba(0,0,0,0.85),
      0 0 2px rgba(200,120,120,0.15);
    background: #000;
    touch-action: manipulation;
  }
  #screen {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    image-rendering: auto;
  }
  #screenWrap::after {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 8%, rgba(255,255,255,0.06), rgba(255,255,255,0) 55%);
    mix-blend-mode: screen;
  }

  /* 触摸控制栏 */
  #controls {
    position: absolute;
    left: 0; right: 0; bottom: 6px;
    display: none;
    justify-content: center;
    gap: 6px;
    padding: 0 8px;
    flex-wrap: wrap;
    transition: opacity 0.4s ease;
    z-index: 5;
  }
  #controls.hidden { opacity: 0; pointer-events: none; }
  .ctl-btn {
    -webkit-appearance: none; appearance: none;
    min-width: 34px; height: 30px;
    padding: 0 8px;
    border: 1px solid rgba(150,120,140,0.35);
    border-radius: 7px;
    background: rgba(14,12,22,0.82);
    color: #d8c8d4;
    font-size: 15px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .ctl-btn:hover { background: rgba(40,28,44,0.9); border-color: rgba(200,120,120,0.5); }
  .ctl-btn:active { transform: scale(0.92); }
  .ctl-btn:focus-visible { outline: 2px solid #e08a6a; outline-offset: 1px; }

  #hint {
    position: absolute;
    bottom: 3px; left: 0; right: 0;
    text-align: center;
    font-size: 7px; letter-spacing: 1px;
    color: #3a2c44;
  }
  #hint b { color: #6a4a5e; }

  /* 竖屏提示 */
  #rotate {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: #05060c; color: #9fb0c8; z-index: 50;
    text-align: center; padding: 24px; gap: 12px;
  }
  #rotate .icon { font-size: 40px; animation: rot 2.4s ease-in-out infinite; }
  #rotate p { font-size: 13px; line-height: 1.6; }
  #rotate small { color: #5a6a86; font-size: 11px; }
  @keyframes rot { 0%,40% { transform: rotate(0deg); } 60%,100% { transform: rotate(90deg); } }

  /* 加载/启动失败提示 */
  #fail {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: #08060a; color: #d8b0b0; z-index: 60;
    text-align: center; padding: 24px; gap: 10px;
  }
  #fail h2 { font-size: 15px; color: #ff8a7a; }
  #fail p { font-size: 12px; color: #9a8a90; line-height: 1.6; max-width: 320px; }

  /* 全屏铺满 */
  :fullscreen #frame, :-webkit-full-screen #frame {
    padding: 0; border-radius: 0; background: #000; box-shadow: none;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  :fullscreen #frame::before, :fullscreen #hint { display: none; }
  :fullscreen #screenWrap { border-radius: 0; box-shadow: none; }

  /* 竖屏且窄屏：提示旋转（仍允许继续观看） */
  @media (orientation: portrait) and (max-width: 640px) {
    #frame::before { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    #rotate .icon { animation: none; }
  }
</style>
</head>
<body>
  <div id="frame">
    <div id="screenWrap">
      <!-- 画布：为屏幕阅读器提供剧情与操作说明 -->
      <canvas id="screen" width="320" height="180"
              role="img"
              aria-label="《三体·第一部》像素动画小剧场。三幕剧：红岸基地叶文洁向太阳发射信号、三体世界的乱纪元与孤独的监听员、以及改变人类命运的回答。使用下方控制栏或键盘操作：空格或点击推进对白，A 自动播放，L 查看对白记录，M 静音，F 全屏。">
      </canvas>
      <canvas id="ui" aria-hidden="true"></canvas>
      <!-- 无障碍：实时对白文本镜像（视觉隐藏，供读屏） -->
      <div id="srLog" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;"></div>
    </div>
    <div id="controls" aria-label="播放控制"></div>
    <div id="hint"><b>[Z/空格/点击]</b> 推进 &nbsp; <b>[A]</b>自动 &nbsp; <b>[L]</b>记录 &nbsp; <b>[F]</b>全屏 &nbsp; <b>[M]</b>静音 &nbsp; <b>[←/→/1-3]</b>切幕</div>
  </div>

  <!-- 竖屏提示 -->
  <div id="rotate">
    <div class="icon">📱</div>
    <p>建议横屏观看<br>以获得完整的宽画面演出</p>
    <small>（也可直接竖屏继续 · 轻触屏幕开始）</small>
  </div>

  <!-- 启动失败提示 -->
  <div id="fail">
    <h2>无法启动</h2>
    <p id="failMsg">你的浏览器可能不支持所需功能（Canvas / Web Audio）。请更换较新的 Chrome、Safari 或 Edge 后重试。</p>
  </div>

  <!-- 引擎 -->
  <script src="js/engine.js"></script>
  <script src="js/display.js"></script>
  <!-- 音频 -->
  <script src="js/audio.js"></script>
  <script src="js/music.js"></script>
  <script src="js/score.js"></script>
  <script src="js/score2.js"></script>
  <!-- 美术 -->
  <script src="js/scenes.js"></script>
  <script src="js/actors.js"></script>
  <script src="js/ui.js"></script>
  <!-- 导演 & 剧本 -->
  <script src="js/director.js"></script>
  <script src="js/play.js"></script>
  <script src="js/play2.js"></script>
  <!-- 入口 -->
  <script src="js/main.js"></script>

  <!-- 启动失败兜底：若 3 秒内未初始化成功则提示 -->
  <script>
    (function () {
      // 竖屏提示（仅窄屏竖屏时显示，不阻断）
      function checkOrient() {
        var r = document.getElementById('rotate');
        var portrait = window.matchMedia('(orientation: portrait)').matches;
        var narrow = window.innerWidth < 640;
        r.style.display = (portrait && narrow && !window.__started) ? 'flex' : 'none';
      }
      window.addEventListener('resize', checkOrient);
      window.addEventListener('orientationchange', checkOrient);
      // 隐藏竖屏提示：一旦开始
      document.addEventListener('pointerdown', function () { window.__started = true; setTimeout(checkOrient, 50); });
      setTimeout(checkOrient, 100);

      // 启动失败兜底
      setTimeout(function () {
        if (!window.HE || !window.__HE_GAME) {
          document.getElementById('fail').style.display = 'flex';
        }
      }, 3000);
      window.addEventListener('error', function (e) {
        if (!window.__HE_GAME) {
          document.getElementById('fail').style.display = 'flex';
          var m = document.getElementById('failMsg');
          if (m && e && e.message) m.textContent = '启动时发生错误：' + e.message;
        }
      });
    })();
  </script>
</body>
</html>
